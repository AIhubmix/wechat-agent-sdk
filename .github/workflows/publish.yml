name: Publish to PyPI

on:
  push:
    tags:
      - "v*"  # 打 v0.1.0 这样的 tag 时触发

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Trusted Publisher (免 token)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # 使用 Trusted Publisher，无需配置 token
        # 需要先在 pypi.org 项目设置中添加 GitHub 仓库作为 Trusted Publisher
